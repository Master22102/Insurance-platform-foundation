# Optional E2E contracts — does not run on every PR (needs secrets + storage state).
# Run manually: Actions → "E2E contracts (optional)" → Run workflow.
# See docs/CI_E2E_SAMPLE.md for secrets and PLAYWRIGHT_STORAGE_STATE_B64.
name: E2E contracts (optional)

on:
  workflow_dispatch:
    inputs:
      run_policy_governance:
        description: 'Also run policy-governance E2E (slow; needs extraction worker)'
        type: boolean
        default: false
      strict_policy_governance_rest:
        description: 'When governance runs: fail if PostgREST chain errors (needs RLS + JWT aligned)'
        type: boolean
        default: false
      require_playwright_storage_state:
        description: 'Fail if PLAYWRIGHT_STORAGE_STATE_B64 secret is missing (no silent auth skips)'
        type: boolean
        default: false

defaults:
  run:
    working-directory: Insurance-platform-foundation-main

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Insurance-platform-foundation-main/package-lock.json
      - name: Install
        run: npm ci
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - name: Storage state from secret (optional)
        env:
          PLAYWRIGHT_STORAGE_STATE_B64: ${{ secrets.PLAYWRIGHT_STORAGE_STATE_B64 }}
        run: |
          if [ -z "$PLAYWRIGHT_STORAGE_STATE_B64" ]; then
            if [ "${{ inputs.require_playwright_storage_state }}" = "true" ]; then
              echo "::error::require_playwright_storage_state is true but PLAYWRIGHT_STORAGE_STATE_B64 is not set (see docs/CI_E2E_SAMPLE.md)"
              exit 1
            fi
            echo "No PLAYWRIGHT_STORAGE_STATE_B64 — specs that need auth will skip."
            exit 0
          fi
          mkdir -p .playwright
          echo "$PLAYWRIGHT_STORAGE_STATE_B64" | base64 -d > .playwright/storageState.json
      - name: E2E contracts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # SHIP_BAR C2: when storage is required, fail fast if file/env missing (no silent skip)
          E2E_REQUIRE_CONTRACTS: ${{ inputs.require_playwright_storage_state == true && '1' || '' }}
        run: npm run e2e:contracts
      - name: E2E policy governance (optional)
        if: ${{ inputs.run_policy_governance }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          E2E_STRICT_POLICY_GOVERNANCE_REST: ${{ inputs.strict_policy_governance_rest == true && '1' || '' }}
        run: npm run e2e:policy-governance
