# Manual DB verification (service_role). Does not run on PRs.
# Actions → "Verify optional (DB)" → Run workflow.
# Requires secrets — workflow fails fast if any are missing (unlike `npm run verify:ingest-corpus-idempotency` locally, which skips).
# See docs/VERIFY_OPTIONAL.md
name: Verify optional (DB)

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: Insurance-platform-foundation-main

jobs:
  ingest-corpus-idempotency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Insurance-platform-foundation-main/package-lock.json
      - name: Install
        run: npm ci
      - name: ingest_corpus_rules document idempotency
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VERIFY_CORPUS_ACTOR_UUID: ${{ secrets.VERIFY_CORPUS_ACTOR_UUID }}
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ] || [ -z "${VERIFY_CORPUS_ACTOR_UUID:-}" ]; then
            echo "::error::Configure repo secrets: NEXT_PUBLIC_SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, VERIFY_CORPUS_ACTOR_UUID (docs/VERIFY_OPTIONAL.md)"
            exit 1
          fi
          npm run verify:ingest-corpus-idempotency
