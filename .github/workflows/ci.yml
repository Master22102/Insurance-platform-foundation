# CI without Supabase secrets: typecheck + lint + verify:csp-config + verify:migration-chain + production build.
# Build uses placeholder NEXT_PUBLIC_* so `next build` can inline client env (no real keys).
# Playwright / contract tests: see docs/CI_E2E_SAMPLE.md (requires secrets + storage state).
#
# This workflow assumes the Git repo root IS this app (package.json at repo root).
# If instead the repo root is a parent folder that contains `Insurance-platform-foundation-main/`,
# set `defaults.run.working-directory` to that subfolder and set cache-dependency-path to
# `Insurance-platform-foundation-main/package-lock.json`.
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Verify CSP config (report-only vs enforce)
        run: npm run verify:csp-config
      - name: Verify pass12–14 migration files present
        run: npm run verify:migration-chain
      - name: Verify A1 RPC inventory baseline (no new HIGH without allowlist)
        run: npm run verify:a1-inventory
      - name: Build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key-for-ci-build-only
        run: npm run build
