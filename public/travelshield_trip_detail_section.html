<!-- TravelShield section as it appears on the trip detail overview -->
<div style="background: white; border-radius: 12px; border: 0.5px solid #e5e7eb; padding: 12px 14px; width: 280px; font-family: system-ui, -apple-system, sans-serif;">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <div>
      <p style="font-size: 13px; font-weight: 500; color: #0f172a; margin: 0;">TravelShield active</p>
      <p style="font-size: 10px; color: #059669; margin: 2px 0 0;">3 partners · All online</p>
    </div>
    <div style="display: flex;">
      <div style="width: 24px; height: 24px; border-radius: 50%; background: #E6F1FB; border: 1.5px solid white; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; color: #185FA5;">SA</div>
      <div style="width: 24px; height: 24px; border-radius: 50%; background: #EEEDFE; border: 1.5px solid white; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; color: #534AB7; margin-left: -6px;">MR</div>
      <div style="width: 24px; height: 24px; border-radius: 50%; background: #E1F5EE; border: 1.5px solid white; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 500; color: #0F6E56; margin-left: -6px;">LT</div>
      <div style="width: 24px; height: 24px; border-radius: 50%; background: white; border: 1.5px dashed #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #ccc; margin-left: -4px; cursor: pointer;">+</div>
    </div>
  </div>
  <div style="display: flex; gap: 6px; margin-top: 10px;">
    <div style="flex: 1; padding: 8px; background: #f0f9ff; border: 0.5px solid #bae6fd; border-radius: 8px; text-align: center; font-size: 11px; font-weight: 500; color: #0369a1; cursor: pointer;">View on map</div>
    <div style="flex: 1; padding: 8px; background: #f0fdf4; border: 0.5px solid #bbf7d0; border-radius: 8px; text-align: center; font-size: 11px; font-weight: 500; color: #059669; cursor: pointer;">Request check-in</div>
  </div>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid #f0f0f0;">
    <p style="font-size: 10px; color: #94a3b8; margin: 0;">Active for 2h 14m</p>
    <p style="font-size: 10px; color: #94a3b8; margin: 0; cursor: pointer;">Settings</p>
  </div>
</div>
